---
# playbooks/_bench_tier_batch.yml
# Included by 03_benchmark.yml once per batch of up to 6 models.
#
# Expected vars (passed via include_tasks vars:):
#   _batch_node1  — list of 0–3 model names for port 11434
#   _batch_node0  — list of 0–3 model names for port 11435
#
# Mutates host facts (accumulated across batches):
#   bench_all_results    — list of uri result dicts
#   all_eligible_models  — list of model names that passed load
#
# Concurrency design (load and benchmark phases both use async):
#   Load:      node1 and node0 warm-up "Hi" prompts fire simultaneously.
#              Within each node Ollama still loads one model at a time,
#              but both nodes drain their queues in parallel.
#   Benchmark: same pattern — both nodes' prompt queues drain together.
#   uri timeout covers the full queue-drain wait (see inline comments).
#   loop_var: _async_job on collect tasks preserves the uri module's
#   item=[model, ...] field so downstream tasks need no structural changes.

# ── Load models into RAM (both nodes concurrently) ────────────────────────────
# 3 models per node, sequential within each node → last model waits for 2
# ahead: max load wait ≤ 2 × load_timeout. Use load_timeout × 4 for margin.

- name: "Benchmark | Load node1 models into RAM (async)"
  ansible.builtin.uri:
    url: "http://localhost:11434/api/generate"
    method: POST
    body_format: json
    body:
      model: "{{ item }}"
      prompt: "Hi"
      stream: false
    headers:
      Authorization: "Bearer {{ ollama_api_key }}"
    timeout: "{{ (benchmark_load_timeout | int) * 4 }}"
    status_code: 200
  loop: "{{ _batch_node1 }}"
  loop_control:
    label: "node1 load: {{ item }}"
  async: "{{ (benchmark_load_timeout | int) * 5 }}"
  poll: 0
  register: _load_node1_jobs
  failed_when: false

- name: "Benchmark | Load node0 models into RAM (async)"
  ansible.builtin.uri:
    url: "http://localhost:{{ ollama_node0_port }}/api/generate"
    method: POST
    body_format: json
    body:
      model: "{{ item }}"
      prompt: "Hi"
      stream: false
    headers:
      Authorization: "Bearer {{ ollama_api_key }}"
    timeout: "{{ (benchmark_load_timeout | int) * 4 }}"
    status_code: 200
  loop: "{{ _batch_node0 }}"
  loop_control:
    label: "node0 load: {{ item }}"
  async: "{{ (benchmark_load_timeout | int) * 5 }}"
  poll: 0
  register: _load_node0_jobs
  failed_when: false

- name: "Benchmark | Collect node1 load results"
  ansible.builtin.async_status:
    jid: "{{ _async_job.ansible_job_id }}"
  loop: "{{ _load_node1_jobs.results | default([]) }}"
  loop_control:
    loop_var: _async_job
    label: "node1 load: {{ _async_job.item | default('?') }}"
  register: _load_node1
  until: _load_node1.finished
  retries: "{{ ((benchmark_load_timeout | int) * 5 / 15) | int + 5 }}"
  delay: 15
  failed_when: false

- name: "Benchmark | Collect node0 load results"
  ansible.builtin.async_status:
    jid: "{{ _async_job.ansible_job_id }}"
  loop: "{{ _load_node0_jobs.results | default([]) }}"
  loop_control:
    loop_var: _async_job
    label: "node0 load: {{ _async_job.item | default('?') }}"
  register: _load_node0
  until: _load_node0.finished
  retries: "{{ ((benchmark_load_timeout | int) * 5 / 15) | int + 5 }}"
  delay: 15
  failed_when: false

# ── Identify successfully loaded models ───────────────────────────────────────

- name: "Benchmark | Identify loaded models in batch"
  ansible.builtin.set_fact:
    _eligible_node1: "{{ _load_node1.results | selectattr('status', 'equalto', 200) | map(attribute='item') | list }}"
    _eligible_node0: "{{ _load_node0.results | selectattr('status', 'equalto', 200) | map(attribute='item') | list }}"

# ── Fire benchmark prompts at both nodes concurrently ─────────────────────────
# uri timeout = large_timeout × 15 (18 000 s) covers the full queue-drain
# wait: worst case 21 queued requests, 2 parallel, 1 200 s each →
# max queue wait ≈ 12 000 s < 18 000 s. async = ×18, collect retries
# 730 × 30 s = 21 900 s of headroom.

- name: "Benchmark | Fire test prompts at node1 (async)"
  ansible.builtin.uri:
    url: "http://localhost:11434/api/generate"
    method: POST
    body_format: json
    body:
      model: "{{ item.0 }}"
      prompt: "{{ test_prompts[item.1].prompt }}"
      stream: false
    headers:
      Authorization: "Bearer {{ ollama_api_key }}"
    timeout: "{{ (benchmark_large_timeout | int) * 15 }}"
    status_code: 200
  loop: "{{ _eligible_node1 | product(test_prompts.keys() | list) | list }}"
  loop_control:
    label: "{{ item.0 }} / {{ item.1 }}"
  async: "{{ (benchmark_large_timeout | int) * 18 }}"
  poll: 0
  register: _bench_node1_jobs
  failed_when: false

- name: "Benchmark | Fire test prompts at node0 (async)"
  ansible.builtin.uri:
    url: "http://localhost:{{ ollama_node0_port }}/api/generate"
    method: POST
    body_format: json
    body:
      model: "{{ item.0 }}"
      prompt: "{{ test_prompts[item.1].prompt }}"
      stream: false
    headers:
      Authorization: "Bearer {{ ollama_api_key }}"
    timeout: "{{ (benchmark_large_timeout | int) * 15 }}"
    status_code: 200
  loop: "{{ _eligible_node0 | product(test_prompts.keys() | list) | list }}"
  loop_control:
    label: "{{ item.0 }} / {{ item.1 }}"
  async: "{{ (benchmark_large_timeout | int) * 18 }}"
  poll: 0
  register: _bench_node0_jobs
  failed_when: false

- name: "Benchmark | Collect node1 results"
  ansible.builtin.async_status:
    jid: "{{ _async_job.ansible_job_id }}"
  loop: "{{ _bench_node1_jobs.results | default([]) }}"
  loop_control:
    loop_var: _async_job
    label: "{{ _async_job.item[0] | default('?') }} / {{ _async_job.item[1] | default('?') }}"
  register: _bench_node1
  until: _bench_node1.finished
  retries: 730
  delay: 30
  failed_when: false

- name: "Benchmark | Collect node0 results"
  ansible.builtin.async_status:
    jid: "{{ _async_job.ansible_job_id }}"
  loop: "{{ _bench_node0_jobs.results | default([]) }}"
  loop_control:
    loop_var: _async_job
    label: "{{ _async_job.item[0] | default('?') }} / {{ _async_job.item[1] | default('?') }}"
  register: _bench_node0
  until: _bench_node0.finished
  retries: 730
  delay: 30
  failed_when: false

# ── Accumulate results into play-scoped facts ─────────────────────────────────

- name: "Benchmark | Accumulate batch results"
  ansible.builtin.set_fact:
    bench_all_results: >-
      {{ bench_all_results
         + (_bench_node1.results | default([]))
         + (_bench_node0.results | default([])) }}
    all_eligible_models: >-
      {{ all_eligible_models + _eligible_node1 + _eligible_node0 }}
